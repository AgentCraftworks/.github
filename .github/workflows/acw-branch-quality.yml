# Engagement Level: T1 (Read) — Read-only quality checks on feature branches before PR.
# Runs on push to feature branches to surface issues before PR is opened.
# Provides early feedback loop so PRs arrive already quality-gated.
# See: AGENTS.md (engagement levels), .github/copilot/instructions.md.

name: acw-branch-quality

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'docs/**'
      - 'refactor/**'
      - 'perf/**'
    paths-ignore:
      - '**.md'
      - '.github/CODEOWNERS'

permissions:
  contents: read

jobs:
  policy-contract-lint:
    name: Validate governance policy contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate immutable pin, ruleset alignment, and escalation contract
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const read = (relPath) =>
              fs.readFileSync(path.join(process.env.GITHUB_WORKSPACE, relPath), "utf8");

            const policyPath = "docs/standards/pr-readiness-policy-spec.json";
            const policy = JSON.parse(read(policyPath));
            const template = read(".github/workflow-templates/acw-pr-readiness.yml");
            const wrapper = read(".github/workflows/acw-pr-readiness.yml");
            const reusable = read(".github/workflows/acw-pr-readiness-reusable.yml");
            const releases = read("docs/standards/reusable-workflow-releases.md");

            const errors = [];

            const immutablePattern = new RegExp(policy.immutable_pin_policy.allowed_reusable_workflow_ref_pattern);
            const templateUsesMatch = template.match(
              /uses:\s*(AgentCraftworks\/\.github\/\.github\/workflows\/acw-pr-readiness-reusable\.yml@[^\s]+)/
            );
            if (!templateUsesMatch) {
              errors.push("Template workflow is missing reusable workflow 'uses:' reference.");
            } else {
              const usesRef = templateUsesMatch[1];
              if (!immutablePattern.test(usesRef)) {
                errors.push(
                  `Template reusable workflow pin is not immutable or not policy-compliant: '${usesRef}'.`
                );
              }

              const sha = usesRef.split("@")[1] || "";
              if (!/^[0-9a-f]{40}$/i.test(sha)) {
                errors.push(`Template reusable workflow ref must be a 40-character commit SHA. Found '${sha}'.`);
              } else if (!releases.includes(`| \`acw-pr-readiness-reusable\` |`) || !releases.includes(`\`${sha}\``)) {
                errors.push(
                  `Pinned SHA '${sha}' is not recorded in docs/standards/reusable-workflow-releases.md.`
                );
              }
            }

            const extractWithValue = (content, key) => {
              const match = content.match(new RegExp(`\\n\\s+${key}:\\s*([^\\n]+)`));
              return (match?.[1] || "").trim();
            };

            const extractReusableDefault = (content, inputName) => {
              const re = new RegExp(`${inputName}:[\\s\\S]*?default:\\s*([^\\n]+)`);
              return (content.match(re)?.[1] || "").trim();
            };

            const expectedReviewer = String(policy.escalation.required_human_reviewer || "");
            const expectedBranches = String(policy.ruleset_alignment.protected_branches.join(","));
            const expectedLabel = String(policy.escalation.label || "");

            const templateReviewer = extractWithValue(template, "required_human_reviewer");
            const wrapperReviewer = extractWithValue(wrapper, "required_human_reviewer");
            if (templateReviewer !== expectedReviewer || wrapperReviewer !== expectedReviewer) {
              errors.push(
                `required_human_reviewer mismatch. Expected '${expectedReviewer}', template='${templateReviewer}', wrapper='${wrapperReviewer}'.`
              );
            }

            const templateBranches = extractWithValue(template, "enforced_base_branches");
            const wrapperBranches = extractWithValue(wrapper, "enforced_base_branches");
            if (templateBranches !== expectedBranches || wrapperBranches !== expectedBranches) {
              errors.push(
                `enforced_base_branches mismatch. Expected '${expectedBranches}', template='${templateBranches}', wrapper='${wrapperBranches}'.`
              );
            }

            const templateLabel = extractWithValue(template, "escalation_label");
            const wrapperLabel = extractWithValue(wrapper, "escalation_label");
            if (templateLabel !== expectedLabel || wrapperLabel !== expectedLabel) {
              errors.push(
                `escalation_label mismatch. Expected '${expectedLabel}', template='${templateLabel}', wrapper='${wrapperLabel}'.`
              );
            }

            const reusableDefaultReviewer = extractReusableDefault(reusable, "required_human_reviewer");
            const reusableDefaultBranches = extractReusableDefault(reusable, "enforced_base_branches");
            const reusableDefaultLabel = extractReusableDefault(reusable, "escalation_label");
            if (reusableDefaultReviewer !== expectedReviewer) {
              errors.push(
                `Reusable workflow default required_human_reviewer mismatch. Expected '${expectedReviewer}', found '${reusableDefaultReviewer}'.`
              );
            }
            if (reusableDefaultBranches !== expectedBranches) {
              errors.push(
                `Reusable workflow default enforced_base_branches mismatch. Expected '${expectedBranches}', found '${reusableDefaultBranches}'.`
              );
            }
            if (reusableDefaultLabel !== expectedLabel) {
              errors.push(
                `Reusable workflow default escalation_label mismatch. Expected '${expectedLabel}', found '${reusableDefaultLabel}'.`
              );
            }

            const declaredJobIds = new Set(
              [...reusable.matchAll(/^  ([a-z0-9-]+):\s*$/gm)].map((m) => m[1])
            );
            for (const requiredJobId of policy.ruleset_alignment.required_gate_job_ids || []) {
              if (!declaredJobIds.has(requiredJobId)) {
                errors.push(`Reusable workflow missing required gate job id '${requiredJobId}'.`);
              }
            }

            const marker = String(policy.escalation.comment_marker || "").trim();
            if (marker && !reusable.includes(marker)) {
              errors.push(
                `Reusable escalation comment marker '${marker}' not found; escalation dedupe contract is not aligned.`
              );
            }

            if (errors.length > 0) {
              core.setFailed(
                `Governance policy contract validation failed (${errors.length} issue(s)):\n- ${errors.join("\n- ")}`
              );
              return;
            }

            core.info("Governance policy contract validation passed.");

  yaml-lint:
    name: Lint workflow YAML
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint .github/workflows
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" .github/workflows/

  detect-secrets:
    name: Detect committed secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets (detect-secrets)
        uses: reviewdog/action-detect-secrets@v0
        with:
          github_token: ${{ github.token }}
          reporter: github-check
          fail_on_error: false

  dependency-audit:
    name: Dependency vulnerability pre-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ hashFiles('package.json', 'package-lock.json', 'yarn.lock', 'requirements.txt', 'Pipfile.lock', 'go.sum') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency review (branch diff against default branch)
        uses: actions/dependency-review-action@v4
        with:
          base-ref: ${{ github.event.repository.default_branch }}
          head-ref: ${{ github.sha }}
          fail-on-severity: high
          comment-summary-in-pr: never
        continue-on-error: false

  quality-summary:
    name: Branch quality summary
    runs-on: ubuntu-latest
    needs: [policy-contract-lint, yaml-lint, detect-secrets, dependency-audit]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Report quality gate results
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = ${{ toJson(needs) }};
            const failed = Object.entries(jobs)
              .filter(([, v]) => v.result === 'failure')
              .map(([k]) => k);
            const skipped = Object.entries(jobs)
              .filter(([, v]) => v.result === 'skipped')
              .map(([k]) => k);

            await core.summary
              .addHeading('Branch Quality Report')
              .addRaw(`Branch: \`${{ github.ref_name }}\`\n\n`)
              .addRaw(`Commit: \`${{ github.sha }}\`\n\n`)
              .addTable([
                [{data: 'Check', header: true}, {data: 'Result', header: true}],
                ...Object.entries(jobs).map(([k, v]) => [k, v.result])
              ])
              .addRaw(failed.length > 0
                ? `\n⚠️ **${failed.length} check(s) need attention before opening PR:** ${failed.join(', ')}`
                : '\n✅ Branch quality checks passed. Safe to open PR.')
              .write();

            if (failed.length > 0) {
              core.warning(`Branch quality issues detected: ${failed.join(', ')}. Resolve before opening PR.`);
            }
