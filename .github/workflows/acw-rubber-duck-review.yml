# Engagement Level: T2 (Comment) — Posts AI rubber-duck review comments on Draft PRs.
# Enforces draft-first intake and runs once per PR (suppressed on re-push after first review).
# Uses GitHub Models inference API so model is configurable and token usage is visible.
# See: AGENTS.md, .github/copilot/instructions.md.

name: acw-rubber-duck-review

on:
  pull_request:
    types: [opened, reopened, synchronize, converted_to_draft]

permissions:
  contents: read
  pull-requests: write

jobs:
  enforce-draft-first:
    name: Enforce draft-first intake
    runs-on: ubuntu-latest
    if: ${{ github.event.action == 'opened' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Convert newly-opened PR to draft
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr?.node_id) {
              core.setFailed("Missing pull_request.node_id in event payload.");
              return;
            }
            await github.graphql(
              `
              mutation($pullRequestId: ID!) {
                convertPullRequestToDraft(input: { pullRequestId: $pullRequestId }) {
                  pullRequest {
                    number
                    isDraft
                  }
                }
              }
              `,
              { pullRequestId: pr.node_id }
            );
            core.notice(`Converted PR #${pr.number} to draft for pre-human get-to-green checks.`);

  rubber-duck-review:
    name: Rubber duck review (pre-human)
    runs-on: ubuntu-latest
    # Only run on draft PRs — final review is handled by native Copilot on ready_for_review.
    if: ${{ github.event.pull_request.draft == true }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Check if rubber duck review already posted
        id: check-prior
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            // Look for a prior review comment from the app (bot marker in body)
            const prior = reviews.some(r =>
              (r.body || "").includes("<!-- acw-rubber-duck-review -->")
            );
            if (prior) {
              core.notice("Rubber duck review already posted on this PR. Skipping re-review.");
              core.setOutput("skip", "true");
            } else {
              core.setOutput("skip", "false");
            }

      - name: Checkout
        if: ${{ steps.check-prior.outputs.skip == 'false' }}
        uses: actions/checkout@v6

      - name: Collect changed files and diff
        id: diff
        if: ${{ steps.check-prior.outputs.skip == 'false' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 30,
            });
            const summary = files.map(f =>
              `### ${f.filename} (+${f.additions}/-${f.deletions})\n\`\`\`diff\n${(f.patch || "(binary or too large)").slice(0, 3000)}\n\`\`\``
            ).join("\n\n");
            core.setOutput("file_count", files.length.toString());
            core.setOutput("diff_summary", summary);
            core.setOutput("filenames", files.map(f => f.filename).join(", "));

      - name: Run rubber duck review via GitHub Models API
        id: duck-review
        if: ${{ steps.check-prior.outputs.skip == 'false' }}
        uses: actions/github-script@v7
        env:
          DUCK_MODEL: ${{ vars.ACW_RUBBER_DUCK_MODEL || 'openai/gpt-4o' }}
          DIFF_SUMMARY: ${{ steps.diff.outputs.diff_summary }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        with:
          github-token: ${{ github.token }}
          script: |
            const model = process.env.DUCK_MODEL;
            const diff = process.env.DIFF_SUMMARY || "";
            const prTitle = process.env.PR_TITLE || "";
            const prBody = process.env.PR_BODY || "";

            const prompt = [
              "You are a senior engineer doing a pre-human rubber duck code review.",
              "This PR is still in Draft. Your job is to surface real issues early so the developer can fix them BEFORE requesting human review.",
              "Be direct, specific, and actionable. Do not comment on style unless it causes bugs.",
              "Focus on: logic errors, security issues, missing error handling, performance problems, breaking changes.",
              "",
              `PR Title: ${prTitle}`,
              `PR Description: ${prBody}`,
              "",
              "## Changed files",
              diff,
              "",
              "Respond in markdown with sections: ## Summary, ## Issues Found (if any), ## Suggestions. Keep total response under 800 words.",
            ].join("\n");

            // Call GitHub Models inference endpoint
            const response = await fetch("https://models.inference.ai.azure.com/chat/completions", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${process.env.GITHUB_TOKEN}`,
              },
              body: JSON.stringify({
                model,
                messages: [{ role: "user", content: prompt }],
                max_tokens: 1200,
                temperature: 0.2,
              }),
            });

            if (!response.ok) {
              const text = await response.text();
              core.warning(`GitHub Models API returned ${response.status}: ${text}. Skipping rubber duck review.`);
              core.setOutput("review_body", "");
              return;
            }

            const data = await response.json();
            const review = data.choices?.[0]?.message?.content || "";
            const usage = data.usage || {};
            core.info(`Tokens used — prompt: ${usage.prompt_tokens}, completion: ${usage.completion_tokens}, total: ${usage.total_tokens}`);
            core.setOutput("review_body", review);
            core.setOutput("prompt_tokens", usage.prompt_tokens?.toString() || "0");
            core.setOutput("completion_tokens", usage.completion_tokens?.toString() || "0");
            core.setOutput("total_tokens", usage.total_tokens?.toString() || "0");

      - name: Post rubber duck review comment
        if: ${{ steps.check-prior.outputs.skip == 'false' && steps.duck-review.outputs.review_body != '' }}
        uses: actions/github-script@v7
        env:
          REVIEW_BODY: ${{ steps.duck-review.outputs.review_body }}
          DUCK_MODEL: ${{ vars.ACW_RUBBER_DUCK_MODEL || 'openai/gpt-4o' }}
          PROMPT_TOKENS: ${{ steps.duck-review.outputs.prompt_tokens }}
          COMPLETION_TOKENS: ${{ steps.duck-review.outputs.completion_tokens }}
          TOTAL_TOKENS: ${{ steps.duck-review.outputs.total_tokens }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const body = [
              "<!-- acw-rubber-duck-review -->",
              `## 🦆 Rubber Duck Review (Draft — ${process.env.DUCK_MODEL})`,
              "",
              "> This is an automated pre-human review on your **Draft PR**.",
              "> Address any issues below, then mark **Ready for Review** for the final Copilot + human review.",
              "> This review runs **once** and will not repeat on subsequent pushes.",
              "",
              process.env.REVIEW_BODY,
              "",
              "---",
              `<sub>🔢 Token usage: ${process.env.PROMPT_TOKENS} prompt + ${process.env.COMPLETION_TOKENS} completion = **${process.env.TOTAL_TOKENS} total** | Model: \`${process.env.DUCK_MODEL}\`</sub>`,
            ].join("\n");

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body,
              event: "COMMENT",
            });
            core.info("Rubber duck review posted.");

      - name: Post quality summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const skipped = "${{ steps.check-prior.outputs.skip }}" === "true";
            const model = "${{ vars.ACW_RUBBER_DUCK_MODEL || 'openai/gpt-4o' }}";
            const tokens = "${{ steps.duck-review.outputs.total_tokens }}" || "0";
            await core.summary
              .addHeading("🦆 Rubber Duck Review")
              .addRaw(skipped
                ? "ℹ️ Skipped — review already posted on this PR.\n\n"
                : `✅ Review posted using model \`${model}\` (${tokens} tokens)\n\n`)
              .addRaw("Next step: address any findings in this Draft, then mark **Ready for Review**.\n")
              .write();
