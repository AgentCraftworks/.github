# T1: Workflow template for PR readiness gate orchestration.
# Org-wide template for repos to enable automated PR quality/security gates.
# Calls acw-pr-readiness-reusable.yml for implementation.
# See: .github/copilot/instructions.md (engagement levels), AGENTS.md (workflow conventions).

name: ACW PR Readiness

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
      - review_requested
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: read

jobs:
  pr-readiness:
    uses: AgentCraftworks/.github/.github/workflows/acw-pr-readiness-reusable.yml@main
    with:
      required_human_reviewer: jenperret
      enforced_base_branches: staging,main
      request_copilot_review: true
      copilot_reviewer_candidates: copilot,github-copilot[bot]
      escalation_label: needs-human-decision
    secrets:
      GITHUB_APP_ID: ${{ secrets.AGENTCRAFTWORKS_APP_ID }}
      GITHUB_APP_PRIVATE_KEY: ${{ secrets.AGENTCRAFTWORKS_APP_PRIVATE_KEY }}
