# Engagement Level: T3 (Write) — Workflow template for PR readiness gate orchestration.
# Org-wide template for repos to enable automated PR quality/security gates.
# Calls acw-pr-readiness-reusable.yml for implementation.
# See: .github/copilot/instructions.md (engagement levels), AGENTS.md (workflow conventions).
name: ACW-pr-readiness

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review, review_requested]
  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: read
  security-events: read

jobs:
  pr-readiness:
    name: ACW-pr-readiness
    uses: AgentCraftworks/.github/.github/workflows/acw-pr-readiness-reusable.yml@d325d9e46b0d6d320c9c2ed9a43f6081f2429189
    with:
      pull_number: ${{ github.event.pull_request.number }}
      trigger_action: ${{ github.event.action }}
      required_human_reviewer: jenperret
      enforced_base_branches: staging,main
      request_copilot_review: true
      copilot_reviewer_candidates: copilot,github-copilot[bot]
      escalation_label: needs-human-decision
    secrets:
      GH_APP_ID: ${{ secrets.AGENTCRAFTWORKS_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.AGENTCRAFTWORKS_APP_PRIVATE_KEY }}