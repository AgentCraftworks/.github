name: ACW PR Readiness

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
      - review_requested
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: read

jobs:
  pr-readiness:
    uses: AICraftworks/.github/.github/workflows/acw-pr-readiness-reusable.yml@main
    with:
      required_human_reviewer: jenperret
      enforced_base_branches: staging,main
      request_copilot_review: true
      copilot_reviewer_candidates: copilot,github-copilot[bot]
      escalation_label: needs-human-decision
    secrets: inherit
